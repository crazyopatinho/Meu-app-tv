<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, user-scalable=no">
    <title>SISTEMA EXPLOSIVO v1.0</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #explosao-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .particula { position: absolute; background: #ff4500; border-radius: 50%; pointer-events: none; }
        .btn-central { padding: 20px 50px; font-size: 30px; background: transparent; border: 4px solid #00ff41; color: #00ff41; cursor: pointer; text-shadow: 0 0 10px #00ff41; box-shadow: 0 0 15px #00ff41; }
        .btn-central:focus { background: #00ff41; color: #000; outline: none; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="explosao-container"></div>
    <button class="btn-central" id="mainBtn">SISTEMA ATIVO</button>

    <script>
        const container = document.getElementById('explosao-container');

        function criarExplosao(x, y) {
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particula';
                const size = Math.random() * 15 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                
                // Posição inicial
                p.style.left = x + 'px';
                p.style.top = y + 'px';

                container.appendChild(p);

                // Animação da explosão
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 15 + 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                let opacity = 1;
                const interval = setInterval(() => {
                    p.style.left = (parseFloat(p.style.left) + vx) + 'px';
                    p.style.top = (parseFloat(p.style.top) + vy) + 'px';
                    opacity -= 0.02;
                    p.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(interval);
                        p.remove();
                    }
                }, 20);
            }
        }

        // Explosão aleatória a cada 10 segundos
        setInterval(() => {
            const randomX = Math.random() * window.innerWidth;
            const randomY = Math.random() * window.innerHeight;
            criarExplosao(randomX, randomY);
        }, 10000);

        // Explosão ao clicar (ou apertar OK no controle)
        document.getElementById('mainBtn').addEventListener('click', (e) => {
            criarExplosao(window.innerWidth / 2, window.innerHeight / 2);
        });
    </script>
</body>
</html>
